<!-- templates/index.html -->
{% extends "base.html" %}

{% block content %}
<div class="card">
    <div class="section-badge"><i class="fas fa-flask"></i> Flavor Lab</div>
    <h2>Brew the Perfect Cup</h2>
    <p class="subtitle">Dial in your parameters and let the model predict your flavor score</p>

    <form id="coffeeForm">
        <div class="form-grid">
            <div class="form-group">
                <label for="brewing_method"><i class="fas fa-coffee"></i> Brewing Method</label>
                <select id="brewing_method" name="brewing_method" required>
                    <option value="">Select method...</option>
                    <option value="Pour-over">Pour-over</option>
                    <option value="French Press">French Press</option>
                    <option value="Espresso">Espresso</option>
                    <option value="Cold Brew">Cold Brew</option>
                </select>
            </div>

            <div class="form-group">
                <label for="bean_type"><i class="fas fa-seedling"></i> Bean Type</label>
                <select id="bean_type" name="bean_type" required>
                    <option value="">Select bean type...</option>
                    <option value="Arabica">Arabica</option>
                    <option value="Robusta">Robusta</option>
                    <option value="Blend">Blend</option>
                </select>
            </div>

            <div class="form-group">
                <label for="roast_level"><i class="fas fa-fire"></i> Roast Level</label>
                <select id="roast_level" name="roast_level" required>
                    <option value="">Select roast level...</option>
                    <option value="Light">Light</option>
                    <option value="Medium">Medium</option>
                    <option value="Dark">Dark</option>
                </select>
            </div>

            <div class="form-group">
                <label for="grind_size"><i class="fas fa-mortar-pestle"></i> Grind Size</label>
                <select id="grind_size" name="grind_size" required>
                    <option value="">Select grind size...</option>
                    <option value="Fine">Fine</option>
                    <option value="Medium">Medium</option>
                    <option value="Coarse">Coarse</option>
                </select>
            </div>

            <div class="form-group">
                <label for="brew_time"><i class="fas fa-hourglass-half"></i> Brew Time</label>
                <div class="range-container">
                    <input type="range" id="brew_time" name="brew_time" min="15" max="300" value="120">
                    <span class="range-value" id="brew_time_value">120s</span>
                </div>
            </div>

            <div class="form-group">
                <label for="water_temp"><i class="fas fa-temperature-high"></i> Water Temperature</label>
                <div class="range-container">
                    <input type="range" id="water_temp" name="water_temp" min="80" max="100" value="92">
                    <span class="range-value" id="water_temp_value">92°C</span>
                </div>
            </div>

            <div class="form-group">
                <label for="coffee_water_ratio"><i class="fas fa-balance-scale"></i> Coffee : Water Ratio</label>
                <div class="range-container">
                    <input type="range" id="coffee_water_ratio" name="coffee_water_ratio" min="10" max="20" value="16" step="0.5">
                    <span class="range-value" id="ratio_value">1:16</span>
                </div>
            </div>

            <div class="form-group">
                <label for="acidity_pref"><i class="fas fa-lemon"></i> Acidity Preference</label>
                <div class="range-container">
                    <input type="range" id="acidity_pref" name="acidity_pref" min="0" max="10" value="5" step="0.5">
                    <span class="range-value" id="acidity_pref_value">5.0</span>
                </div>
            </div>

            <div class="form-group" style="grid-column: 1 / -1; max-width: calc(50% - 1rem);">
                <label for="bitterness_pref"><i class="fas fa-pepper-hot"></i> Bitterness Preference</label>
                <div class="range-container">
                    <input type="range" id="bitterness_pref" name="bitterness_pref" min="0" max="10" value="5" step="0.5">
                    <span class="range-value" id="bitterness_pref_value">5.0</span>
                </div>
            </div>
        </div>

        <div style="margin-top: 2rem;">
            <button type="submit" class="btn btn-block" id="predictBtn">
                <i class="fas fa-mug-hot"></i> Predict Flavour
            </button>
        </div>
    </form>

    <div id="loading" class="loading-state">
        <div class="spinner-ring"></div>
        <p>Analyzing your brew...</p>
    </div>

    <div id="results" class="results">
        <div class="results-card">
            <div class="section-badge"><i class="fas fa-star"></i> Your Results</div>

            <div class="score-ring">
                <svg viewBox="0 0 120 120">
                    <circle class="track" cx="60" cy="60" r="52"/>
                    <circle class="fill" id="scoreArc" cx="60" cy="60" r="52"
                            stroke-dasharray="326.73"
                            stroke-dashoffset="326.73"/>
                </svg>
                <div class="score-number">
                    <span class="value" id="predictionScore">&mdash;</span>
                    <span class="out-of">out of 10</span>
                </div>
            </div>

            <div class="confidence-bar">
                <i class="fas fa-chart-line"></i>
                Confidence: <strong><span id="confidence">&mdash;</span>%</strong>
            </div>

            <p class="interpretation-text" id="interpretation">&nbsp;</p>

            <h4>Flavor Notes</h4>
            <div class="flavor-chips" id="flavorChips"></div>
        </div>
    </div>
</div>
{% endblock %}
