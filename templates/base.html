<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Flavour Predictor — Brew inputs in. Flavor notes out.</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='images/favicon.svg') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-primary: #0C0A09;
            --bg-secondary: #1C1917;
            --bg-card: rgba(28, 25, 23, 0.7);
            --bg-card-hover: rgba(41, 37, 36, 0.8);
            --border-subtle: rgba(168, 130, 95, 0.12);
            --border-glow: rgba(217, 169, 109, 0.25);
            --gold: #D4A054;
            --gold-light: #E8C88A;
            --gold-dark: #A67C3D;
            --copper: #C4834E;
            --cream: #F5E6D3;
            --cream-muted: rgba(245, 230, 211, 0.7);
            --text-primary: #FAF7F2;
            --text-secondary: rgba(245, 230, 211, 0.6);
            --text-muted: rgba(245, 230, 211, 0.35);
            --accent-green: #6B8F5E;
            --accent-red: #C45B4A;
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --radius-xl: 28px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Ambient background glow */
        body::before {
            content: '';
            position: fixed;
            top: -40%;
            left: -20%;
            width: 80%;
            height: 80%;
            background: radial-gradient(ellipse, rgba(212, 160, 84, 0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -30%;
            right: -20%;
            width: 70%;
            height: 70%;
            background: radial-gradient(ellipse, rgba(196, 131, 78, 0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

        /* ── Header ── */
        header {
            position: relative;
            padding: 0;
            border-bottom: 1px solid var(--border-subtle);
            background: linear-gradient(180deg, rgba(28,25,23,0.95) 0%, var(--bg-primary) 100%);
            backdrop-filter: blur(20px);
            margin-bottom: 2.5rem;
        }
        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.25rem 0;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 1rem;
            text-decoration: none;
            color: var(--text-primary);
        }
        .brand-icon {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            object-fit: cover;
            border: 1px solid var(--border-subtle);
            box-shadow: 0 0 20px rgba(212, 160, 84, 0.1);
        }
        .brand-text h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            line-height: 1.2;
        }
        .brand-text h1 span {
            background: linear-gradient(135deg, var(--gold-light), var(--copper));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .brand-text p {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 400;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-top: 2px;
        }
        .main-nav {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }
        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: var(--radius-sm);
            transition: all 0.2s ease;
            position: relative;
        }
        .nav-link:hover {
            color: var(--text-primary);
            background: rgba(212, 160, 84, 0.08);
        }
        .nav-link.active {
            color: var(--gold);
            background: rgba(212, 160, 84, 0.1);
        }

        /* ── Main ── */
        main { padding-top: 3.5rem; padding-bottom: 5rem; min-height: calc(100vh - 200px); }

        /* ── Cards ── */
        .card {
            background: rgba(32, 28, 26, 0.85);
            border: 1px solid rgba(168, 130, 95, 0.18);
            border-radius: var(--radius-lg);
            padding: 2.25rem;
            margin-bottom: 1.5rem;
            margin-top: 0.5rem;
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 24px rgba(0,0,0,0.2);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        .card:first-child { margin-top: 0; }
        .card:hover {
            border-color: var(--border-glow);
            box-shadow: 0 8px 40px rgba(212, 160, 84, 0.06);
        }

        /* ── Section headers ── */
        .section-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--gold);
            background: rgba(212, 160, 84, 0.08);
            border: 1px solid rgba(212, 160, 84, 0.15);
            padding: 0.4rem 1rem;
            border-radius: 999px;
            margin-bottom: 1rem;
        }
        .section-badge i { font-size: 0.65rem; }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
            line-height: 1.2;
        }
        h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        h4 {
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin: 1.5rem 0 0.75rem;
        }
        .subtitle {
            color: var(--text-secondary);
            font-size: 1.05rem;
            margin-bottom: 2rem;
            font-weight: 300;
        }

        /* ── Form ── */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem 2rem;
        }
        .form-group { margin-bottom: 0; }
        .form-group label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.6rem;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
            letter-spacing: 0.3px;
        }
        .form-group label i {
            color: var(--gold-dark);
            font-size: 0.75rem;
            opacity: 0.7;
        }

        select, input[type="number"], input[type="text"] {
            width: 100%;
            padding: 0.85rem 1.1rem;
            background: rgba(12, 10, 9, 0.6);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: inherit;
            transition: all 0.25s ease;
            appearance: none;
        }
        select {
            background-image: url('data:image/svg+xml;utf8,<svg fill="%23D4A054" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>');
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 16px;
            cursor: pointer;
        }
        select option { background: var(--bg-secondary); color: var(--text-primary); }
        select:focus, input[type="number"]:focus, input[type="text"]:focus {
            outline: none;
            border-color: var(--gold-dark);
            box-shadow: 0 0 0 3px rgba(212, 160, 84, 0.1), 0 0 20px rgba(212, 160, 84, 0.05);
        }

        /* Range slider */
        .range-container { display: flex; align-items: center; gap: 1rem; }
        .range-value {
            min-width: 52px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--gold-light);
            background: rgba(212, 160, 84, 0.08);
            padding: 0.35rem 0.6rem;
            border-radius: var(--radius-sm);
            font-variant-numeric: tabular-nums;
        }
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 6px;
            background: rgba(168, 130, 95, 0.15);
            border-radius: 3px;
            outline: none;
            border: none;
            padding: 0;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold-light), var(--gold-dark));
            border: 3px solid var(--bg-primary);
            box-shadow: 0 0 10px rgba(212, 160, 84, 0.3);
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.15);
            box-shadow: 0 0 16px rgba(212, 160, 84, 0.5);
        }
        input[type="range"]::-moz-range-thumb {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold-light), var(--gold-dark));
            border: 3px solid var(--bg-primary);
            box-shadow: 0 0 10px rgba(212, 160, 84, 0.3);
            cursor: pointer;
        }
        input[type="range"]::-moz-range-track {
            height: 6px;
            background: rgba(168, 130, 95, 0.15);
            border-radius: 3px;
            border: none;
        }

        /* ── Buttons ── */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--bg-primary);
            border: none;
            padding: 1rem 2rem;
            border-radius: var(--radius-md);
            font-size: 0.85rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }
        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.15) 50%, transparent 100%);
            transform: translateX(-100%);
            transition: transform 0.5s ease;
        }
        .btn:hover::before { transform: translateX(100%); }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(212, 160, 84, 0.3);
        }
        .btn:active { transform: translateY(0); }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .btn-block { display: flex; width: 100%; }
        .btn-outline {
            background: transparent;
            color: var(--gold);
            border: 1px solid rgba(212, 160, 84, 0.3);
        }
        .btn-outline:hover {
            background: rgba(212, 160, 84, 0.08);
            border-color: var(--gold);
            box-shadow: 0 4px 20px rgba(212, 160, 84, 0.1);
        }

        /* ── Results ── */
        .results { display: none; margin-top: 2rem; animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .results-card {
            background: linear-gradient(135deg, rgba(28,25,23,0.9), rgba(41,37,36,0.7));
            border: 1px solid var(--border-glow);
            border-radius: var(--radius-xl);
            padding: 2.5rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .results-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        /* Score gauge */
        .score-ring {
            width: 160px;
            height: 160px;
            margin: 0 auto 1.5rem;
            position: relative;
        }
        .score-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
        .score-ring .track { fill: none; stroke: rgba(168, 130, 95, 0.1); stroke-width: 8; }
        .score-ring .fill { fill: none; stroke: url(#scoreGradient); stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 1.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .score-number {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .score-number .value {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(135deg, var(--gold-light), var(--copper));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .score-number .out-of { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }

        .confidence-bar {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            background: rgba(212, 160, 84, 0.06);
            border: 1px solid rgba(212, 160, 84, 0.1);
            padding: 0.5rem 1.25rem;
            border-radius: 999px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 1.25rem;
        }
        .confidence-bar strong { color: var(--gold-light); font-weight: 600; }

        .interpretation-text {
            font-size: 1.05rem;
            color: var(--cream-muted);
            font-style: italic;
            max-width: 500px;
            margin: 0 auto 1.5rem;
            line-height: 1.7;
        }

        .flavor-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
            margin-top: 0.75rem;
        }
        .flavor-chip {
            background: rgba(212, 160, 84, 0.06);
            border: 1px solid rgba(212, 160, 84, 0.12);
            color: var(--cream-muted);
            padding: 0.45rem 1rem;
            border-radius: 999px;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s ease;
        }
        .flavor-chip:hover {
            background: rgba(212, 160, 84, 0.12);
            border-color: rgba(212, 160, 84, 0.25);
        }

        /* ── Spinner ── */
        .loading-state { display: none; text-align: center; padding: 3rem 0; }
        .spinner-ring {
            width: 44px; height: 44px;
            border: 3px solid rgba(168, 130, 95, 0.1);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin: 0 auto 1rem;
        }
        .loading-state p { color: var(--text-muted); font-size: 0.9rem; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Footer ── */
        footer {
            border-top: 1px solid var(--border-subtle);
            padding: 2.5rem 0;
            text-align: center;
            background: rgba(12, 10, 9, 0.5);
        }
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 1rem;
        }
        .footer-links a {
            color: var(--text-muted);
            font-size: 1.15rem;
            transition: color 0.2s ease, transform 0.2s ease;
            display: inline-flex;
        }
        .footer-links a:hover { color: var(--gold); transform: translateY(-2px); }
        .copyright { color: var(--text-muted); font-size: 0.8rem; }

        /* ── Animations ── */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .header-inner { flex-direction: column; gap: 1rem; }
            .form-grid { grid-template-columns: 1fr; gap: 1rem; }
            .card { padding: 1.5rem; }
            h2 { font-size: 1.6rem; }
            main { padding: 2rem 0 3rem; }
            .brand-text h1 { font-size: 1.15rem; }
            .results-card { padding: 1.75rem; }
            .score-ring { width: 130px; height: 130px; }
            .score-number .value { font-size: 2.5rem; }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-inner">
                <a href="/" class="brand">
                    <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="brand-icon">
                    <div class="brand-text">
                        <h1><span>Coffee Flavour</span> Predictor</h1>
                        <p>Brew inputs in · Flavor notes out</p>
                    </div>
                </a>
                <nav class="main-nav">
                    <a href="/" class="nav-link">Home</a>
                    <a href="/brewing-tools" class="nav-link">Brewing Tools</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            <div class="footer-links">
                <a href="https://github.com/Hrk84ya" title="GitHub" target="_blank" rel="noopener"><i class="fab fa-github"></i></a>
                <a href="https://twitter.com/hrk84ya" title="Twitter" target="_blank" rel="noopener"><i class="fab fa-twitter"></i></a>
                <a href="https://www.instagram.com/hrk84ya/" title="Instagram" target="_blank" rel="noopener"><i class="fab fa-instagram"></i></a>
            </div>
            <p class="copyright">&copy; 2026 Coffee Flavor Predictor</p>
        </div>
    </footer>

    <!-- SVG gradient for score ring -->
    <svg width="0" height="0" style="position:absolute">
        <defs>
            <linearGradient id="scoreGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#E8C88A"/>
                <stop offset="100%" stop-color="#C4834E"/>
            </linearGradient>
        </defs>
    </svg>

    {% block scripts %}
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% endblock %}
</body>
</html>
